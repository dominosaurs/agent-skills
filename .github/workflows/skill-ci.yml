name: skill-ci

on:
  push:
  pull_request:

jobs:
  mempalace-librarian:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/runner/work/agent-skills/agent-skills
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile \
            skills/mempalace-librarian/scripts/partition_optimize.py \
            skills/mempalace-librarian/tests/test_partition_optimize.py

      - name: Unit tests
        run: |
          python -m unittest discover \
            -s skills/mempalace-librarian/tests \
            -p 'test_*.py' -v

      - name: CLI Help Smoke
        run: |
          python skills/mempalace-librarian/scripts/partition_optimize.py --help
